<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" class="display" aria-label="Calculator display" readonly>
        <div class="buttons">
            <!-- Functional Buttons -->
            <button id="btn-ac" data-action="allClear" role="button" aria-label="All Clear">AC</button>
            <button id="btn-c" data-action="clear" role="button" aria-label="Clear Entry">C</button>
            <button id="btn-backspace" data-action="backspace" role="button" aria-label="Backspace">←</button>
            <button id="btn-divide" data-type="operator" data-value="/" role="button" aria-label="Divide">/</button>

            <!-- Digits Row 7-9 -->
            <button id="btn-7" data-type="digit" data-value="7" role="button" aria-label="7">7</button>
            <button id="btn-8" data-type="digit" data-value="8" role="button" aria-label="8">8</button>
            <button id="btn-9" data-type="digit" data-value="9" role="button" aria-label="9">9</button>
            <button id="btn-multiply" data-type="operator" data-value="*" role="button" aria-label="Multiply">*</button>

            <!-- Digits Row 4-6 -->
            <button id="btn-4" data-type="digit" data-value="4" role="button" aria-label="4">4</button>
            <button id="btn-5" data-type="digit" data-value="5" role="button" aria-label="5">5</button>
            <button id="btn-6" data-type="digit" data-value="6" role="button" aria-label="6">6</button>
            <button id="btn-subtract" data-type="operator" data-value="-" role="button" aria-label="Subtract">-</button>

            <!-- Digits Row 1-3 -->
            <button id="btn-1" data-type="digit" data-value="1" role="button" aria-label="1">1</button>
            <button id="btn-2" data-type="digit" data-value="2" role="button" aria-label="2">2</button>
            <button id="btn-3" data-type="digit" data-value="3" role="button" aria-label="3">3</button>
            <button id="btn-add" data-type="operator" data-value="+" role="button" aria-label="Add">+</button>

            <!-- Bottom Row -->
            <button id="btn-0" data-type="digit" data-value="0" role="button" aria-label="0">0</button>
            <button id="btn-decimal" data-type="digit" data-value="." role="button" aria-label="Decimal point">.</button>
            <button id="btn-equals" data-action="equals" role="button" aria-label="Equals">=</button>
        </div>
    </div>
</body>
</html>
